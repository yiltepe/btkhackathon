<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>OBEN — Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAFAF8;
    --bg-soft:#FFFFFF;
    --ink:#111111;
    --muted:#7A7A75;
    --muted-2:#9A9A93;
    --line:#E5E5E5;
    --line-soft:#EDEDEA;
    --pill:#F0F0EE;
    --pill-hover:#E8E7E2;
    --accent:#7C2D12;
    --accent-hover:#5A1F0C;
    --shadow: 0 1px 4px rgba(0,0,0,.06);
    --shadow-modal: 0 1px 4px rgba(0,0,0,.06), 0 20px 60px -30px rgba(0,0,0,.18);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;background:var(--bg);color:var(--ink);font-family:'Geist','Söhne','Inter',system-ui,sans-serif;font-weight:400;-webkit-font-smoothing:antialiased;letter-spacing:-0.005em}
  body{overflow:hidden}
  button{font-family:inherit;font-weight:400;color:inherit;background:none;border:0;padding:0;cursor:pointer}
  input,textarea{font-family:inherit;font-weight:400;color:inherit;background:none;border:0;outline:0}
  a{color:inherit;text-decoration:none}

  #root{height:100%}

  /* scrollbars: thin, ghost */
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#D8D5CE;border-radius:6px}
  ::-webkit-scrollbar-thumb:hover{background:#B5B1A8}
</style>
</head>
<body>

<div id="root"></div>

<script type="application/json" id="tweak-defaults">/*EDITMODE-BEGIN*/{
  "accent": "#111111",
  "appName": "OBEN",
  "headline": "Drop a link. Better prices, perfect matches, your next look.",
  "density": "comfortable",
  "vitrineSpeed": 1
}/*EDITMODE-END*/</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="chat-data.jsx"></script>
<script type="text/babel" src="chat-icons.jsx"></script>
<script type="text/babel" src="chat-cards.jsx"></script>
<script type="text/babel" src="chat-modals.jsx"></script>
<script type="text/babel" src="chat-app.jsx"></script>

</body>
</html>
