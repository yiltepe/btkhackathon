<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>OBEN — Your shopping concierge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAFAF8;
    --ink:#111111;
    --muted:#7A7A75;
    --line:#E5E5E5;
    --line-soft:#EDEDEA;
    --pill:#F0F0EE;
    --accent:#7C2D12;
    --card:#FFFFFF;
    --shadow: 0 1px 4px rgba(0,0,0,.06);
    --shadow-item: 0 6px 18px -10px rgba(20,16,12,.18), 0 2px 4px rgba(20,16,12,.04);
    --row-h: 200px;
    --row-gap: 28px;
    --speed-1: 80s;
    --speed-2: 95s;
    --speed-3: 70s;
    --speed-4: 105s;
    --speed-5: 88s;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'Geist','Söhne','Inter',system-ui,sans-serif;font-weight:400;-webkit-font-smoothing:antialiased;letter-spacing:-0.005em}
  body{min-height:100vh;overflow-x:hidden}

  /* ============= NAV ============= */
  header.nav{
    position:fixed;top:0;left:0;right:0;z-index:30;
    display:flex;align-items:center;justify-content:space-between;
    padding:22px 36px;
    pointer-events:none;
  }
  header.nav .logo, header.nav .nav-right{ pointer-events:auto }
  .logo{
    font-size:18px;font-weight:500;letter-spacing:0.02em;
    display:flex;align-items:center;gap:9px;color:var(--ink);text-decoration:none;
  }
  .logo .mark{
    width:22px;height:22px;border:1.25px solid var(--ink);border-radius:50%;
    display:grid;place-items:center;font-size:11px;font-weight:500;letter-spacing:0;
  }
  .nav-right{font-size:13px;color:var(--muted);display:flex;gap:24px;align-items:center}
  .nav-right a{color:var(--muted);text-decoration:none}
  .nav-right a:hover{color:var(--ink)}

  /* ============= VITRINE ============= */
  .vitrine{
    position:fixed;inset:0;z-index:1;
    display:flex;flex-direction:column;justify-content:center;
    gap:var(--row-gap);
    padding:80px 0;
    overflow:hidden;
    -webkit-mask-image: linear-gradient(180deg, transparent 0, #000 12%, #000 88%, transparent 100%);
            mask-image: linear-gradient(180deg, transparent 0, #000 12%, #000 88%, transparent 100%);
  }
  .row{
    display:flex;align-items:center;
    width:max-content;
    gap:18px;
    will-change:transform;
  }
  .row.l{ animation: drift-l linear infinite }
  .row.r{ animation: drift-r linear infinite }
  .row.s1{ animation-duration: var(--speed-1) }
  .row.s2{ animation-duration: var(--speed-2) }
  .row.s3{ animation-duration: var(--speed-3) }
  .row.s4{ animation-duration: var(--speed-4) }
  .row.s5{ animation-duration: var(--speed-5) }
  @keyframes drift-l{ from{transform:translateX(0)} to{transform:translateX(-50%)} }
  @keyframes drift-r{ from{transform:translateX(-50%)} to{transform:translateX(0)} }

  .item{
    flex:0 0 auto;
    height:var(--row-h);
    display:flex;align-items:flex-end;justify-content:center;
    background:var(--card);
    border:1px solid var(--line-soft);
    border-radius:4px;
    box-shadow: var(--shadow-item);
    padding:14px 18px 16px;
    position:relative;
  }
  .item .tag{
    position:absolute;top:10px;left:12px;font-size:9px;letter-spacing:.12em;
    color:var(--muted);text-transform:uppercase;font-weight:500;
  }
  .item .price{
    position:absolute;bottom:10px;right:12px;font-size:10px;color:var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .item svg{height:100%;width:auto;display:block}

  /* Hanger items (clothing) — taller / narrower */
  .item.hanger{width:150px;padding-top:8px;align-items:stretch;justify-content:flex-start;flex-direction:column}
  .item.hanger .hanger-rod{
    height:8px;border-bottom:1px solid #D8D6D1;margin-bottom:-4px;position:relative;
  }
  .item.hanger .hanger-rod::after{
    content:'';position:absolute;left:50%;top:-4px;width:1px;height:8px;background:#C9C5BD;transform:translateX(-50%);
  }
  .item.hanger .hanger-rod::before{
    content:'';position:absolute;left:50%;top:-7px;width:10px;height:5px;border:1px solid #C9C5BD;border-bottom:0;border-radius:50% 50% 0 0/100% 100% 0 0;transform:translateX(-50%);
  }
  .item.hanger svg{margin-top:6px;flex:1;min-height:0;width:100%;height:auto;max-height:calc(var(--row-h) - 50px)}

  /* Square (home/beauty/electronics) */
  .item.square{width:170px;align-items:center;padding:18px}
  .item.square svg{max-height:74%;max-width:80%;width:auto;height:auto}

  /* ============= FOREGROUND ============= */
  .stage{
    position:relative;z-index:10;
    min-height:100vh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding: 0 24px;
    pointer-events:none;
  }
  .stage > *{pointer-events:auto}
  .hero{
    text-align:center;
    background: rgba(250,250,248, 0.9);
    padding: 56px 60px 48px;
    border-radius:6px;
    box-shadow: 0 0 0 1px rgba(229,229,229,.55), 0 4px 30px -16px rgba(20,16,12,.08);
    max-width: 720px;
  }
  .eyebrow{
    font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);
    margin-bottom:24px;font-weight:500;
  }
  .eyebrow .dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--accent);margin-right:8px;vertical-align:middle;transform:translateY(-1px)}
  .wordmark{
    font-size: clamp(72px, 13vw, 168px);
    font-weight:500;
    line-height:.92;
    letter-spacing:-0.045em;
    margin:0 0 28px;
  }
  .tagline{
    font-size: clamp(17px, 1.5vw, 20px);
    font-weight:400;
    color:var(--ink);
    max-width:520px;
    margin: 0 auto 40px;
    line-height:1.45;
    letter-spacing:-0.01em;
    text-wrap:balance;
  }
  .tagline em{font-style:normal;color:var(--muted)}
  .cta{
    display:inline-flex;align-items:center;gap:10px;
    background:var(--accent);color:#FAFAF8;
    text-decoration:none;
    padding:14px 26px;
    border-radius:6px;
    font-size:14px;font-weight:500;
    letter-spacing:.005em;
    transition: transform .18s ease, background .18s ease;
    border:1px solid var(--accent);
  }
  .cta:hover{ background:#5A1F0C; transform: translateY(-1px) }
  .cta:active{ transform: translateY(0) }
  .cta svg{width:14px;height:14px}

  /* meta strip */
  .meta{
    position:fixed;left:36px;bottom:24px;z-index:25;
    font-size:11px;color:var(--muted);letter-spacing:.06em;
    text-transform:uppercase;font-weight:500;
    display:flex;gap:18px;align-items:center;
  }
  .meta .sep{width:24px;height:1px;background:var(--line)}
  .meta-r{
    position:fixed;right:36px;bottom:24px;z-index:25;
    font-size:11px;color:var(--muted);font-weight:500;letter-spacing:.04em;
    font-variant-numeric:tabular-nums;
  }

  @media (max-width:720px){
    :root{--row-h: 150px}
    .item.hanger{width:108px}
    .item.square{width:130px;padding:14px}
    header.nav{padding:18px 20px}
    .meta{left:20px;bottom:18px}
    .meta-r{right:20px;bottom:18px}
    .hero{padding:36px 22px}
  }

  @media (prefers-reduced-motion: reduce){
    .row{ animation: none !important }
  }
</style>
</head>

/* shuffle helper */
function shuf(a){ const r=a.slice(); for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]]} return r }

/* Build rows. We compose 5 rows. Each row gets a doubled set of items so the CSS keyframe (translate -50%) loops seamlessly. */
function buildRow(items, opts){
  const wrap = document.createElement('div');
  wrap.className = `row ${opts.dir} ${opts.speed}`;
  const dup = items.concat(items);
  dup.forEach(it => {
    const el = document.createElement('div');
    el.className = `item ${it.kind}`;
    if(it.kind === 'hanger'){
      el.innerHTML = `
        <span class="tag">${it.tag}</span>
        <div class="hanger-rod"></div>
        ${it.svg}
        <span class="price">${it.price}</span>
      `;
    } else {
      el.innerHTML = `
        <span class="tag">${it.tag}</span>
        ${it.svg}
        <span class="price">${it.price}</span>
      `;
    }
    wrap.appendChild(el);
  });
  return wrap;
}

const vit = document.getElementById('vitrine');
// Curate per-row mix
const fashion = ITEMS.filter(i => i.kind === 'hanger');
const objects = ITEMS.filter(i => i.kind === 'square');

const rows = [
  { items: shuf(fashion).concat(shuf(objects).slice(0,3)),     dir:'l', speed:'s1' },
  { items: shuf(objects).concat(shuf(fashion).slice(0,4)),     dir:'r', speed:'s2' },
  { items: shuf(fashion),                                       dir:'l', speed:'s3' },
  { items: shuf(objects).concat(shuf(fashion).slice(0,2)),     dir:'r', speed:'s4' },
  { items: shuf(fashion).concat(shuf(objects).slice(0,2)),     dir:'l', speed:'s5' },
];
rows.forEach(r => vit.appendChild(buildRow(shuf(r.items), r)));
